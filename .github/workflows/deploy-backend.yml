name: Deploy backend

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-backend
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  checks:
    name: Tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Verify OpenAPI documentation is up to date
        run: |
          if [ -n "$(git status --porcelain -- docs/openapi.json)" ]; then
            git diff -- docs/openapi.json || true
            git status --short -- docs/openapi.json
            echo "::error::docs/openapi.json is out of date. Run ./mvnw test or scripts/generate-openapi.sh and commit the generated file."
            exit 1
          fi

      - name: Validate production Compose config
        env:
          POSTGRES_DB: bybit_payer
          POSTGRES_USER: bybit
          POSTGRES_PASSWORD: ci-postgres-password
          AUTH_USERNAME: operator
          AUTH_PASSWORD_HASH: '{bcrypt}$2a$10$dXJ3SW6G7P50lGmMkkmwe.20cQQubK3.HZWzG3YB1tlRy.fqvM/BG'
          AUTH_REMEMBER_ME_KEY: ci-remember-me-key-at-least-32-characters
          APP_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          BYBIT_API_KEY: ci-bybit-api-key
          BYBIT_API_SECRET: ci-bybit-api-secret
          BYBIT_BASE_URL: https://api.bybit.example
          BYBIT_P2P_AD_ID: ci-ad-id
          RECEIPT_MAIL_USERNAME: ci@example.com
          RECEIPT_MAIL_PASSWORD: ci-mail-password
        run: |
          touch .env
          docker compose -f compose.prod.yml config --quiet

      - name: Build Docker image
        run: docker build -t bybit-payer-backend:ci .

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: checks
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          : "${VPS_HOST:?Set GitHub secret VPS_HOST}"
          : "${VPS_USER:?Set GitHub secret VPS_USER}"
          : "${VPS_SSH_PRIVATE_KEY:?Set GitHub secret VPS_SSH_PRIVATE_KEY}"

          VPS_SSH_PORT="${VPS_SSH_PORT:-22}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "${VPS_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H -p "$VPS_SSH_PORT" "$VPS_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail

          : "${VPS_HOST:?Set GitHub secret VPS_HOST}"
          : "${VPS_USER:?Set GitHub secret VPS_USER}"

          VPS_SSH_PORT="${VPS_SSH_PORT:-22}"
          VPS_APP_DIR="${VPS_APP_DIR:-/opt/bybit-payer/backend}"
          remote_app_dir="$(printf '%q' "$VPS_APP_DIR")"

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_SSH_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "APP_DIR=${remote_app_dir} BRANCH=master bash -s" < scripts/deploy-backend.sh
