services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bybit-payer-db
      POSTGRES_USER: bb-payer
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bb-payer -d bybit-payer-db"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: .
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: bybit-payer-db
      POSTGRES_USER: bb-payer
      POSTGRES_PASSWORD: postgres
      AUTH_USERNAME: ${AUTH_USERNAME:?AUTH_USERNAME is required}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:?AUTH_PASSWORD_HASH is required}
      AUTH_REMEMBER_ME_KEY: ${AUTH_REMEMBER_ME_KEY:?AUTH_REMEMBER_ME_KEY is required}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
