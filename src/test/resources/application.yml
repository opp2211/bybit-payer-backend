spring:
  config:
    import: optional:file:./.env[.properties]
  datasource:
    url: jdbc:h2:mem:bybitpayer;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

receipt:
  mail:
    enabled: false

auth:
  username: operator
  password-hash: "{bcrypt}$2a$10$dXJ3SW6G7P50lGmMkkmwe.20cQQubK3.HZWzG3YB1tlRy.fqvM/BG"
  remember-me-key: test-remember-me-key-at-least-32-characters
  remember-me-validity: 24855d
  max-failed-attempts: 10
  failure-window: 5m

bybit:
  base-url: ${BYBIT_BASE_URL:}
