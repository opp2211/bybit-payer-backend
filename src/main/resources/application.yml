spring:
  config:
    import: optional:file:./.env[.properties]
  application:
    name: bybit-payer-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:bybit-payer-db}
    username: ${POSTGRES_USER:bb-payer}
    password: ${POSTGRES_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        same-site: strict

auth:
  username: ${AUTH_USERNAME:}
  email: ${AUTH_EMAIL:opp.2211@gmail.com}
  password-hash: ${AUTH_PASSWORD_HASH:}
  remember-me-key: ${AUTH_REMEMBER_ME_KEY:}
  remember-me-validity: ${AUTH_REMEMBER_ME_VALIDITY:30d}
  remember-me-secure: ${AUTH_REMEMBER_ME_SECURE:false}
  max-failed-attempts: ${AUTH_MAX_FAILED_ATTEMPTS:10}
  failure-window: ${AUTH_FAILURE_WINDOW:5m}

app:
  encryption-key: ${APP_ENCRYPTION_KEY:}

bybit:
  api-key: ${BYBIT_API_KEY:}
  api-secret: ${BYBIT_API_SECRET:}
  base-url: ${BYBIT_BASE_URL:https://api.bybit.com}
  recv-window-ms: ${BYBIT_RECV_WINDOW_MS:10000}
  p2p-ad-id: ${BYBIT_P2P_AD_ID:}
  p2p-poll-interval: ${BYBIT_P2P_POLL_INTERVAL_SECONDS:5}s
  rate-limit-requests-per-second: ${BYBIT_RATE_LIMIT_REQUESTS_PER_SECOND:10}
  retry-max-attempts: ${BYBIT_RETRY_MAX_ATTEMPTS:3}
  retry-backoff-seconds: ${BYBIT_RETRY_BACKOFF_SECONDS:1,2,4}
  default-min-rub: ${BYBIT_DEFAULT_MIN_RUB:1000}
  default-max-rub: ${BYBIT_DEFAULT_MAX_RUB:10000}
  rate-source-side: ${BYBIT_RATE_SOURCE_SIDE:BUY}
  rate-source-asset: ${BYBIT_RATE_SOURCE_ASSET:USDT}
  rate-source-fiat: ${BYBIT_RATE_SOURCE_FIAT:RUB}
  rate-source-payment-method: ${BYBIT_RATE_SOURCE_PAYMENT_METHOD:Bank transfer}
  rate-source-amount: ${BYBIT_RATE_SOURCE_AMOUNT:10000}
  rate-source-ad-index: ${BYBIT_RATE_SOURCE_AD_INDEX:15}
  rate-source-min-ad-index: ${BYBIT_RATE_SOURCE_MIN_AD_INDEX:7}
  ad-rate-refresh-interval: ${BYBIT_AD_RATE_REFRESH_INTERVAL_MINUTES:5}m
  order-source-side: ${BYBIT_ORDER_SOURCE_SIDE:SELL}
  order-page-size: ${BYBIT_ORDER_PAGE_SIZE:30}
  balance-account-type: ${BYBIT_BALANCE_ACCOUNT_TYPE:FUND}
  balance-coin: ${BYBIT_BALANCE_COIN:USDT}

business:
  attention-timeout: ${ATTENTION_TIMEOUT_SECONDS:300}s
  chat-message-delay: ${CHAT_MESSAGE_DELAY_MS:1000}ms
  usdt-quantity-scale: ${USDT_QUANTITY_SCALE:4}
  max-published-amounts: ${MAX_PUBLISHED_AMOUNTS:10}
  p2p-fee-rate: ${P2P_FEE_RATE:0.00275}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-5-nano}
  responses-url: ${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
  timeout: ${OPENAI_TIMEOUT_SECONDS:15}s

ai:
  chat-agent:
    enabled: ${AI_CHAT_AGENT_ENABLED:true}
    dry-run-by-default: ${AI_CHAT_AGENT_DRY_RUN_BY_DEFAULT:false}
    poll-interval: ${AI_CHAT_AGENT_POLL_INTERVAL_SECONDS:5}s
    max-unclear-replies-per-step: ${AI_CHAT_AGENT_MAX_UNCLEAR_REPLIES_PER_STEP:3}
    max-cancellation-replies: ${AI_CHAT_AGENT_MAX_CANCELLATION_REPLIES:8}
    max-paid-without-receipt-replies: ${AI_CHAT_AGENT_MAX_PAID_WITHOUT_RECEIPT_REPLIES:3}

system:
  status-refresh-interval: ${SYSTEM_STATUS_REFRESH_INTERVAL_SECONDS:30}s
  status-initial-delay: ${SYSTEM_STATUS_INITIAL_DELAY_SECONDS:0}s

receipt:
  mail:
    enabled: true
    host: imap.gmail.com
    port: 993
    folder: INBOX
    sender: noreply@tinkoff.ru
    only-unread: true
    mark-seen-on-valid: true
    max-messages: 20
    poll-interval: ${IMAPS_POLL_INTERVAL_SECONDS:5}s
    connection-timeout: 10s
    read-timeout: 20s
    subject-prefix: ${RECEIPT_SUBJECT_PREFIX:Документ по операции}
    username: ${IMAPS_USERNAME:${RECEIPT_MAIL_USERNAME:}}
    password: ${IMAPS_PASSWORD:${RECEIPT_MAIL_PASSWORD:}}
