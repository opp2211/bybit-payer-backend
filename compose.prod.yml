name: bybit-payer

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    networks:
      - database

  backend:
    build:
      context: .
    image: ${BACKEND_IMAGE:-bybit-payer-backend:local}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      AUTH_USERNAME: ${AUTH_USERNAME:?AUTH_USERNAME is required}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:?AUTH_PASSWORD_HASH is required}
      AUTH_REMEMBER_ME_KEY: ${AUTH_REMEMBER_ME_KEY:?AUTH_REMEMBER_ME_KEY is required}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY is required}
      BYBIT_API_KEY: ${BYBIT_API_KEY:?BYBIT_API_KEY is required}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET:?BYBIT_API_SECRET is required}
      BYBIT_BASE_URL: ${BYBIT_BASE_URL:?BYBIT_BASE_URL is required}
      BYBIT_P2P_AD_ID: ${BYBIT_P2P_AD_ID:?BYBIT_P2P_AD_ID is required}
      RECEIPT_MAIL_USERNAME: ${RECEIPT_MAIL_USERNAME:?RECEIPT_MAIL_USERNAME is required}
      RECEIPT_MAIL_PASSWORD: ${RECEIPT_MAIL_PASSWORD:?RECEIPT_MAIL_PASSWORD is required}
      JAVA_TOOL_OPTIONS: >-
        -XX:InitialRAMPercentage=20.0
        -XX:MaxRAMPercentage=60.0
        -Djava.io.tmpdir=/tmp
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8081/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    stop_grace_period: 30s
    mem_limit: 640m
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    networks:
      - application
      - database

volumes:
  postgres-data:

networks:
  application:
  database:
    internal: true
